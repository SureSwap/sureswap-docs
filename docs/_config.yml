title: SureSwap Unified Wallet
description: User documentation for SureSwap — the multichain Telegram wallet with built-in swaps, bridges, limit orders, privacy mode, and perpetuals trading.

url: "https://docs.sureswap.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

# Sidebar nav
nav_sort: case_insensitive

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux links in header
aux_links:
  "Open in Telegram":
    - "https://t.me/SureSwapBot"
aux_links_new_tab: true

# Footer
footer_content: "© 2025 SureSwap. Released under the MIT license."

# Callout support
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: purple
  coming_soon:
    title: Coming Soon
    color: blue

plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
